name: ecovision-backend

# Backend chạy độc lập. Cần hạ tầng (deployment/docker-compose.infra.yml) đã lên trước
# và network ngoài "ecovision-net" đã tồn tại.

services:
  backend:
    build: .
    container_name: ecovision-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [ecovision-net]

networks:
  ecovision-net:
    external: true
