<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #F8F9FA;
            background-image: radial-gradient(#d1d5db 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .login-card {
            box-shadow: 0px 10px 25px rgba(26, 26, 26, 0.05);
            transition: transform 0.3s ease;
        }
        .focus-ring:focus {
            outline: none;
            border-color: #0056B3;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.2);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Shake Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-on-surface">
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-gutter relative overflow-hidden">
<!-- Background decorative elements for a high-end feel -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary-container rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[30%] h-[30%] bg-eco-green rounded-full blur-[100px] opacity-30"></div>
</div>
<div class="w-full max-w-[440px] z-10" id="loginCardContainer">
<div class="login-card bg-surface-container-lowest border border-outline-variant p-10 md:p-12 rounded-xl">
<!-- Logo Section -->
<div class="flex justify-center mb-10">
<img alt="EcoVision Logo" class="h-12 w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA53msh2qFK3gUvomV5JxMRZZ5mGqdGRH0b6D5Ik_VXRbQbzu_BhXK2FTtHDmU0z1p9qn17hHoSwikqhHsb8HQdCaiJxtZtPSBkLuUbYt5Gkpe4RhGBjf4BUvYItqOLhECXkEfiLw0Ao8IX4PJvBxiJAlwi56REbdia2Ta1_SRS8tm88A4QUxonG-IJgCANTl4aMmf-wQjwOoJ25RVJysWLI4ZevW0HQPOoxFt4gDpai8EDV_QtphPV6Ihg_8uRZP8WuW5K-wfwpw">
</div>
<div class="mb-8 text-center">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-2">Đăng nhập</h1>
<p class="font-body-md text-on-surface-variant">Truy cập hệ thống quản lý môi trường</p>
</div>
<!-- Form -->
<form class="space-y-6" id="loginForm">
<!-- Username Field -->
<div class="space-y-2">
<label class="block font-label-md text-on-surface-variant" for="username">Tên đăng nhập</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus-ring font-body-md" id="username" name="username" placeholder="Nhập tên đăng nhập" required="" type="text">
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label-md text-on-surface-variant" for="password">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-white border border-outline-variant rounded-lg focus-ring font-body-md" id="password" name="password" placeholder="Nhập mật khẩu" required="" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center justify-between">
<label class="flex items-center space-x-3 cursor-pointer group">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 transition-all cursor-pointer" type="checkbox">
</div>
<span class="font-body-md text-on-surface-variant group-hover:text-primary transition-colors select-none">Ghi nhớ đăng nhập</span>
</label>
<a class="font-label-md text-primary hover:underline transition-all" href="#">Quên mật khẩu?</a>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full py-4 bg-primary text-on-primary font-label-md rounded-lg opacity-50 cursor-not-allowed hover:bg-primary-container active:scale-[0.98] transition-all flex justify-center items-center gap-2" disabled="" id="submitBtn" type="submit">
<span id="btnText" class="">Đăng nhập</span>
<div class="loader hidden" id="spinner"></div>
</button>
</div>
<!-- Error State (Hidden by default) -->
<div class="hidden animate-in fade-in slide-in-from-top-2 duration-300" id="errorBanner">
<div class="bg-[#fdecea] border-l-4 border-error-red p-4 flex items-start gap-3">
<span class="material-symbols-outlined text-error-red text-[20px]">error</span>
<p class="font-label-md text-error-red">Sai tài khoản hoặc mật khẩu</p>
</div>
</div>
</form>
<div class="mt-10 pt-8 border-t border-surface-container-highest text-center">
<p class="font-label-sm text-outline">Precise Environmental Technology</p>
</div>
</div>
</div>
</main>
<!-- Footer from Shared Components -->
<footer class="bg-surface-container-low dark:bg-surface-dim">
<div class="flex flex-col md:flex-row justify-between items-center gap-base px-margin-mobile md:px-margin-desktop py-gutter w-full max-w-container-max mx-auto">
<div class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline-variant">
            © 2024 EcoVision. All rights reserved. Precise Environmental Technology.
        </div>
<div class="flex flex-wrap justify-center gap-4">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed transition-colors underline" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed transition-colors underline" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed transition-colors underline" href="#">Security Disclosure</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed transition-colors underline" href="#">Contact Support</a>
</div>
</div>
</footer>
<script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const errorBanner = document.getElementById('errorBanner');
    const togglePassword = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');
    const loginCardContainer = document.getElementById('loginCardContainer');

    // Toggle Password Visibility
    togglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        eyeIcon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
    });

    // Enable/Disable Button Logic
    const checkFields = () => {
        if (usernameInput.value.trim() !== '' && passwordInput.value.trim() !== '') {
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            submitBtn.classList.add('cursor-pointer');
        } else {
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            submitBtn.classList.remove('cursor-pointer');
        }
    };

    usernameInput.addEventListener('input', checkFields);
    passwordInput.addEventListener('input', checkFields);

    // Simulation of login action
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        // Start Loading State
        submitBtn.disabled = true;
        btnText.classList.add('hidden');
        spinner.classList.remove('hidden');
        errorBanner.classList.add('hidden');

        // Artificial delay to simulate network request
        setTimeout(() => {
            // Show error state as requested in prompt logic
            spinner.classList.add('hidden');
            btnText.classList.remove('hidden');
            submitBtn.disabled = false;
            errorBanner.classList.remove('hidden');
            
            // Visual feedback on password field
            passwordInput.classList.add('border-error-red');
            setTimeout(() => passwordInput.classList.remove('border-error-red'), 3000);

            // Add Shake Animation to card container
            loginCardContainer.classList.add('animate-shake');
            // Remove the class after animation completes so it can be re-triggered
            loginCardContainer.addEventListener('animationend', () => {
                loginCardContainer.classList.remove('animate-shake');
            }, { once: true });

        }, 1500);
    });
</script>


</body></html>
