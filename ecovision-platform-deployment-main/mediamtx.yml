# MediaMTX — cấu hình cho EcoVision (DEV).
# Cho phép ẩn danh publish/read/api để backend đăng ký path và trình duyệt xem WebRTC.
# (Production: siết lại authInternalUsers.)

logLevel: info

# Cho phép mọi hành động từ mọi IP, không cần mật khẩu (DEV ONLY)
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics
      - action: pprof

# Control API (backend gọi để thêm/xóa path camera)
api: yes
apiAddress: :9997

# RTSP
rtsp: yes
rtspAddress: :8554

# WebRTC (live view độ trễ thấp)
webrtc: yes
webrtcAddress: :8889
# Chỉ quảng bá localhost (tránh quảng bá IP container 172.x mà browser không tới được)
webrtcAdditionalHosts: [localhost]
webrtcIPsFromInterfaces: no
webrtcLocalUDPAddress: :8189

# HLS (fallback)
hls: yes
hlsAddress: :8888

# Path camera được backend thêm động (FEAT-VMS-01).
paths:
